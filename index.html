<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>等門開的時候</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        html, body {
            position: relative; height: 100%; margin: 0; padding: 0;
            background-color: rgb(237, 227, 211); overflow: hidden;
            font-family: sans-serif;
        }

        .swiper { width: 100%; height: 100%; }

        /* 每一組畫面的基本設定 */
        .swiper-slide {
            display: flex; 
            justify-content: center; 
            align-items: center;
            box-sizing: border-box;
            padding: 3vh 2vw;
        }

        /* 📖 左右跨頁大外框（預設橫向/電腦版） */
        .book-spread {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            position: relative;
            max-width: 95vw;
            max-height: 85vh;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            background-color: #fff; 
        }

        /* 控制雙頁模式下的單張圖片大小（預設） */
        .book-page-img {
            max-height: 85vh;
            max-width: 47vw;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        /* 📦 讓右側有遊戲的頁面變成一個獨立的定位容器 */
        .page-container {
            position: relative;
            display: inline-block;
            height: max-content;
            width: max-content;
        }

        /* 單頁模式（封面、封底）自適應修正 */
        .single-page-img {
            max-height: 85vh;
            max-width: 85vw;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        /* 📐 擬真立體書脊（橫向時顯示） */
        .book-spine {
            width: 14px;
            height: 100%;
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            z-index: 5;
            pointer-events: none; 
            background: linear-gradient(to right, 
                rgba(255, 255, 255, 0.35) 0%, 
                rgba(0, 0, 0, 0.04) 35%, 
                rgba(0, 0, 0, 0.18) 48%, 
                rgba(0, 0, 0, 0.22) 50%, 
                rgba(0, 0, 0, 0.15) 52%, 
                rgba(0, 0, 0, 0.03) 65%, 
                rgba(255, 255, 255, 0.35) 100%
            );
            display: block;
        }

        /* 🎯 點擊框百分比定位，緊緊綁著圖片 */
        .game-link {
            position: absolute;
            z-index: 999;
            cursor: pointer;
            background: rgba(255, 0, 0, 0.4); 
            border: 2px solid red;
        }

        /* 🕹️ 第一個遊戲定位 (糖果罐位置調整) */
        .game1-pos {
            bottom: 8%;       
            right: 7%; 
            width: 12%; 
            height: 18%;
        }

        /* 🕹️ 第二個遊戲定位 */
        .game2-pos {
            bottom: 20%;       
            right: 10%; 
            width: 23%; 
            height: 22%;
        }

        /* 📱【關鍵改動：手機直向（Portrait）智慧放大防變小】*/
        @media (max-width: 767px) and (orientation: portrait) {
            /* 讓 Swiper 允許這頁的內容上下溢出捲動，避免圖片被壓扁 */
            .swiper-slide {
                overflow-y: auto !important;
                display: block !important; /* 取消置中，改由自然流向 */
                padding: 2vh 4vw;
            }

            /* 跨頁外框轉向：改成上下垂直排列 */
            .book-spread {
                flex-direction: column !important;
                max-width: 100% !important;
                max-height: none !important;
                box-shadow: none !important;
                background-color: transparent !important;
            }

            /* 圖片單張放大：寬度直接撐滿，長輩才看得清字！ */
            .book-page-img {
                max-width: 92vw !important;
                max-height: none !important;
                width: 100% !important;
                height: auto !important;
                margin-bottom: 15px; /* 兩頁中間留點空隙 */
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
                background-color: #fff;
            }

            /* 直向時隱藏中間的立體書脊（因為已經變成上下排列了） */
            .book-spine {
                display: none !important;
            }

            /* 封面與封底直向時也放大 */
            .single-page-img {
                max-width: 92vw !important;
                max-height: 80vh !important;
                margin: 0 auto;
            }
        }

        /* 翻頁按鈕尺寸自適應 */
        .swiper-button-next, .swiper-button-prev {
            --swiper-navigation-size: 30px;
        }
        @media (max-width: 480px) {
            .swiper-button-next, .swiper-button-prev { --swiper-navigation-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            
            <div class="swiper-slide">
                <img src="img/1.jpg" alt="封面" class="single-page-img">
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/2.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <img src="img/3.jpg" class="book-page-img">
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/4.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <img src="img/5.jpg" class="book-page-img">
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/6.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <img src="img/7.jpg" class="book-page-img">
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/8.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <img src="img/9.jpg" class="book-page-img">
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/10.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <img src="img/11.jpg" class="book-page-img">
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/12.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <img src="img/13.jpg" class="book-page-img">
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/14.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <img src="img/15.jpg" class="book-page-img">
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/16.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <div class="page-container">
                        <img src="img/17.jpg" class="book-page-img">
                        <a class="game-link game1-pos" onclick="openGameWindow('https://little557.github.io/story-game/')"></a>
                    </div>
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/18.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <img src="img/19.jpg" class="book-page-img">
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/20.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <img src="img/21.jpg" class="book-page-img">
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/22.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <div class="page-container">
                        <img src="img/23.jpg" class="book-page-img">
                        <a class="game-link game2-pos" onclick="openGameWindow('https://little557.github.io/memory-game/')"></a>
                    </div>
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/24.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <img src="img/25.jpg" class="book-page-img">
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/26.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <img src="img/27.jpg" class="book-page-img">
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/28.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <img src="img/29.jpg" class="book-page-img">
                </div>
            </div>
            
            <div class="swiper-slide">
                <img src="img/30.jpg" alt="封底" class="single-page-img">
            </div>

        </div>

        <div class="swiper-button-next" style="color: #8b7d6b;"></div>
        <div class="swiper-button-prev" style="color: #8b7d6b;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        var swiper = new Swiper(".mySwiper", {
            slidesPerView: 1,       
            spaceBetween: 0,
            speed: 1000, 
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
            keyboard: true,
        });

        function openGameWindow(url) {
            if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                window.open(url, '_blank');
            } else {
                var width = 1024;
                var height = 768;
                var left = (screen.width - width) / 2;
                var top = (screen.height - height) / 2;
                var windowFeatures = `width=${width},height=${height},top=${top},left=${left},resizable=yes,scrollbars=yes,status=no,toolbar=no,menubar=no,location=no`;
                window.open(url, 'GameWindow', windowFeatures);
            }
        }
    </script>
</body>
</html>
