<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>等門開的時候</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        html, body {
            position: relative; height: 100%; margin: 0; padding: 0;
            background-color: rgb(237, 227, 211); overflow: hidden;
            font-family: sans-serif;
        }

        .swiper { width: 100%; height: 100%; }

        /* 每一組畫面的基本設定 */
        .swiper-slide {
            display: flex; 
            justify-content: center; 
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
        }

        /* 📖 響應式左右跨頁大外框 */
        .book-spread {
            display: flex;
            flex-direction: row; /* 強制永遠維持橫向並排，絕不變成上下排 */
            align-items: center;
            justify-content: center;
            position: relative;
            max-width: 95vw;
            max-height: 85vh;
            width: max-content;
            height: max-content;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            background-color: #fff; 
        }

        /* 控制雙頁模式下的單張圖片大小 */
        .book-page-img {
            max-height: 85vh;
            max-width: 47vw;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            flex-shrink: 1;
        }

        /* 單頁模式（封面、封底） */
        .single-page-img {
            max-height: 85vh;
            max-width: 90vw;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        /* 📐 擬真立體書脊 */
        .book-spine {
            width: 2%;
            max-width: 16px;
            min-width: 6px;
            height: 100%;
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            z-index: 5;
            pointer-events: none; 
            background: linear-gradient(to right, 
                rgba(255, 255, 255, 0.35) 0%, 
                rgba(0, 0, 0, 0.04) 35%, 
                rgba(0, 0, 0, 0.18) 48%, 
                rgba(0, 0, 0, 0.22) 50%, 
                rgba(0, 0, 0, 0.15) 52%, 
                rgba(0, 0, 0, 0.03) 65%, 
                rgba(255, 255, 255, 0.35) 100%
            );
        }

        /* 🎯 點擊框樣式 */
        .game-link {
            position: absolute;
            z-index: 999;
            cursor: pointer;
            /* 🛠️ 如果要調位置，可以取消註解下面兩行著色測試 */
            /* background: rgba(255, 0, 0, 0.4); */
            /* border: 2px solid red; */
        }

        /* 🕹️ 第一個遊戲定位 (第 17 頁右側) */
        .game1-pos {
            bottom: 10%;       
            right: 4%; 
            width: 8%; 
            height: 12%;
            min-width: 45px;
        }

        /* 🕹️ 第二個遊戲定位 (第 23 頁右側) */
        .game2-pos {
            bottom: 22%;       
            right: 5%; 
            width: 18%; 
            height: 15%;
            min-width: 90px;
        }

        /* 📱 【核心 RWD 修正】當手機窄螢幕直放時 */
        @media (max-width: 767px) and (orientation: portrait) {
            .swiper-slide {
                padding: 10px; /* 縮小邊距，把空間留給繪本 */
            }
            .book-spread {
                flex-direction: row !important; /* 拒絕變成上下排，維持繪本一體性 */
                max-width: 96vw !important;     /* 寬度撐滿螢幕左右 */
                max-height: auto !important;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            }
            .book-page-img {
                max-width: 48vw !important;    /* 兩頁各佔手機寬度的一半 */
                max-height: 40vh !important;   /* 高度等比例縮小，防止變形 */
                height: auto !important;
                width: auto !important;
            }
            .single-page-img {
                max-width: 85vw !important;    /* 封面封底在直向時的比例修正 */
                max-height: 65vh !important;
            }
            /* 在直向安全比例下，點擊框會完美貼合，無需重新寫死px，維持原樣即可 */
        }

        /* 翻頁按鈕尺寸自適應 */
        .swiper-button-next, .swiper-button-prev {
            --swiper-navigation-size: 30px;
        }
        @media (max-width: 480px) {
            .swiper-button-next, .swiper-button-prev { --swiper-navigation-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            
            <div class="swiper-slide">
                <img src="img/1.jpg" alt="封面" class="single-page-img">
            </div>

            <div class="swiper-slide">
                <div class="book-spread"><img src="img/2.jpg" class="book-page-img"><div class="book-spine"></div><img src="img/3.jpg" class="book-page-img"></div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread"><img src="img/4.jpg" class="book-page-img"><div class="book-spine"></div><img src="img/5.jpg" class="book-page-img"></div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread"><img src="img/6.jpg" class="book-page-img"><div class="book-spine"></div><img src="img/7.jpg" class="book-page-img"></div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/8.jpg" class="book-page-img">
                    <img src="img/9.jpg" class="book-page-img">
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread"><img src="img/10.jpg" class="book-page-img"><div class="book-spine"></div><img src="img/11.jpg" class="book-page-img"></div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread"><img src="img/12.jpg" class="book-page-img"><div class="book-spine"></div><img src="img/13.jpg" class="book-page-img"></div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread"><img src="img/14.jpg" class="book-page-img"><div class="book-spine"></div><img src="img/15.jpg" class="book-page-img"></div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/16.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <img src="img/17.jpg" class="book-page-img">
                    <a class="game-link game1-pos" onclick="openGameWindow('https://little557.github.io/story-game/')"></a>
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread"><img src="img/18.jpg" class="book-page-img"><div class="book-spine"></div><img src="img/19.jpg" class="book-page-img"></div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread"><img src="img/20.jpg" class="book-page-img"><div class="book-spine"></div><img src="img/21.jpg" class="book-page-img"></div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread">
                    <img src="img/22.jpg" class="book-page-img">
                    <div class="book-spine"></div>
                    <img src="img/23.jpg" class="book-page-img">
                    <a class="game-link game2-pos" onclick="openGameWindow('https://little557.github.io/memory-game/')"></a>
                </div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread"><img src="img/24.jpg" class="book-page-img"><div class="book-spine"></div><img src="img/25.jpg" class="book-page-img"></div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread"><img src="img/26.jpg" class="book-page-img"><div class="book-spine"></div><img src="img/27.jpg" class="book-page-img"></div>
            </div>

            <div class="swiper-slide">
                <div class="book-spread"><img src="img/28.jpg" class="book-page-img"><div class="book-spine"></div><img src="img/29.jpg" class="book-page-img"></div>
            </div>
            
            <div class="swiper-slide">
                <img src="img/30.jpg" alt="封底" class="single-page-img">
            </div>

        </div>

        <div class="swiper-button-next" style="color: #8b7d6b;"></div>
        <div class="swiper-button-prev" style="color: #8b7d6b;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        var swiper = new Swiper(".mySwiper", {
            slidesPerView: 1,       
            spaceBetween: 0,
            speed: 1000, 
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
            keyboard: true,
        });

        function openGameWindow(url) {
            if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                window.open(url, '_blank');
            } else {
                var width = 1024;
                var height = 768;
                var left = (screen.width - width) / 2;
                var top = (screen.height - height) / 2;
                var windowFeatures = `width=${width},height=${height},top=${top},left=${left},resizable=yes,scrollbars=yes,status=no,toolbar=no,menubar=no,location=no`;
                window.open(url, 'GameWindow', windowFeatures);
            }
        }
    </script>
</body>
</html>
