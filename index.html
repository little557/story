<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>只是變慢了，不是沒用了</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        html, body {
            position: relative; height: 100%; margin: 0; padding: 0;
            background-color: rgb(237, 227, 211); overflow: hidden;
            font-family: sans-serif;
        }

        .swiper { width: 100%; height: 100%; }

        /* 每一組畫面的基本設定 */
        .swiper-slide {
            display: flex; 
            justify-content: center; 
            align-items: center;
            box-sizing: border-box;
            padding: 3vh 2vw;
        }

        /* 📖 左右跨頁大外框（預設橫向/電腦版） */
        .book-spread {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            position: relative;
            max-width: 95vw;
            max-height: 85vh;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            background-color: #fff; 
        }

        /* 控制雙頁模式下的單張圖片大小 */
        .book-page-img {
            max-height: 85vh;
            max-width: 47vw;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        /* 📦 讓右側有遊戲的頁面變成一個獨立的定位容器 */
        .page-container {
            position: relative;
            display: inline-block;
            height: max-content;
            width: max-content;
        }

        /* 單頁模式（封面、封底）自適應修正 */
        .single-page-img {
            max-height: 85vh;
            max-width: 85vw;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        /* 📐 擬真立體書脊（橫向時顯示） */
        .book-spine {
            width: 14px;
            height: 100%;
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            z-index: 5;
            pointer-events: none; 
            background: linear-gradient(to right, 
                rgba(255, 255, 255, 0.35) 0%, 
                rgba(0, 0, 0, 0.04) 35%, 
                rgba(0, 0, 0, 0.18) 48%, 
                rgba(0, 0, 0, 0.22) 50%, 
                rgba(0, 0, 0, 0.15) 52%, 
                rgba(0, 0, 0, 0.03) 65%, 
                rgba(255, 255, 255, 0.35) 100%
            );
            display: block;
        }

        /* 🎯 點擊框百分比定位，緊緊綁著圖片（預設維持隱形透明） */
        .game-link {
            position: absolute;
            z-index: 999;
            cursor: pointer;
            background: transparent; 
            border: none;
            /*💡 提示：如果之後需要微調位置，可以把下面兩行取消註解來塗色測試*/
            /*background: rgba(255, 0, 0, 0.4); 
            border: 2px solid red; */
        }

        /* 🕹️ 第一個遊戲定位 (死死綁在第 29 頁右下方) */
        .game1-pos {
            bottom: 22%;       
            right: 14%; 
            width: 15%; 
            height: 20%;
        }

        /* 🕹️ 第二個遊戲定位 (死死綁在第 37 頁右下) */
        .game2-pos {
            bottom: 10%;       
            right: 5%; 
            width: 15%; 
            height: 20%;
        }

        /* 📱【手機直向優化：智慧放大防變小】*/
        @media (max-width: 767px) and (orientation: portrait) {
            .swiper-slide {
                overflow-y: auto !important;
                display: block !important; 
                padding: 2vh 4vw;
            }
            .book-spread {
                flex-direction: column !important;
                max-width: 100% !important;
                max-height: none !important;
                box-shadow: none !important;
                background-color: transparent !important;
            }
            .book-page-img {
                max-width: 92vw !important;
                max-height: none !important;
                width: 100% !important;
                height: auto !important;
                margin-bottom: 15px; 
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
                background-color: #fff;
            }
            .book-spine { 
                display: none !important; 
            }
            .single-page-img {
                max-width: 92vw !important;
                max-height: 80vh !important;
                margin: 0 auto;
            }
        }

        /* 翻頁按鈕尺寸自適應 */
        .swiper-button-next, .swiper-button-prev {
            --swiper-navigation-size: 30px;
        }
        @media (max-width: 480px) {
            .swiper-button-next, .swiper-button-prev { --swiper-navigation-size: 20px; }
        }
    </style>
</head>
<body>

        </div>

        <div class="swiper-button-next" style="color: #8b7d6b;"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        var swiper = new Swiper(".mySwiper", {
            slidesPerView: 1,       
            spaceBetween: 0,
            speed: 1000, 
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
            keyboard: true,
        });

        function openGameWindow(url) {
            if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                window.open(url, '_blank');
            } else {
                var width = 1024;
                var height = 768;
                var left = (screen.width - width) / 2;
                var top = (screen.height - height) / 2;
                var windowFeatures = `width=${width},height=${height},top=${top},left=${left},resizable=yes,scrollbars=yes,status=no,toolbar=no,menubar=no,location=no`;
                window.open(url, 'GameWindow', windowFeatures);
            }
        }
    </script>

</html>
